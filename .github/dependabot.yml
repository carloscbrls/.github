# Dependabot configuration — automatic dependency updates for ALL CC3PO repos
# Partners: Hermes, Cody, Prometheus, Aria — this keeps your dependencies fresh
# 
# This is the default config. Individual repos can override by creating their own
# .github/dependabot.yml with different schedules or ecosystems.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "auto-merge"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "auto-merge"
