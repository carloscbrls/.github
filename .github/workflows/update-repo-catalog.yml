# Update Repo Catalog — Keeps REPO-CATALOG.md fresh with current repo list
# Runs weekly and on demand. Partners can trigger via workflow_dispatch.

name: Update Repo Catalog

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am PT
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate repo catalog
        run: |
          cat > REPO-CATALOG.md << 'HEADER'
          # 🗺️ CC3PO Repo Catalog — Partner Reference

          > **For Atlas, Hermes, Prometheus, Cody, Aria, Mimir, and every village partner.**
          > This is the map of all repos. Know what exists before you build something new.
          > Auto-generated weekly. Last updated: $(date -u +"%Y-%m-%d")

          HEADER

      - name: List all repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🌐 Web Properties (Public)" >> REPO-CATALOG.md
          echo "" >> REPO-CATALOG.md
          echo "| Repo | Purpose |" >> REPO-CATALOG.md
          echo "|------|---------|" >> REPO-CATALOG.md
          gh repo list carloscbrls --json name,description,isPrivate --limit 100 --visibility public \
            --jq '.[] | "| `\(.name)` | \(.description // "N/A") |"' >> REPO-CATALOG.md

          echo "" >> REPO-CATALOG.md
          echo "## 🔧 Core Systems (Private)" >> REPO-CATALOG.md
          echo "" >> REPO-CATALOG.md
          echo "| Repo | Purpose |" >> REPO-CATALOG.md
          echo "|------|---------|" >> REPO-CATALOG.md
          gh repo list carloscbrls --json name,description,isPrivate --limit 100 --visibility private \
            --jq '.[] | "| `\(.name)` | \(.description // "N/A") |"' >> REPO-CATALOG.md

          echo "" >> REPO-CATALOG.md
          echo "---" >> REPO-CATALOG.md
          echo "*Auto-generated by GitHub Actions | Maintained by Atlas 🌍*" >> REPO-CATALOG.md

      - name: Commit if changed
        run: |
          git config user.name "Atlas 🌍"
          git config user.email "atlas@cc3po.com"
          git add REPO-CATALOG.md
          git diff --cached --quiet || git commit -m "Auto-update repo catalog [skip ci]"
          git push
